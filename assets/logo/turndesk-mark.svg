<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TurnDesk mark — technicians rotating fairly around the dashboard, gold marks who is next">
  <title>TurnDesk mark (full — dashboard grid center)</title>
  <!-- Fair-turn rotation: technicians (teal dots) evenly spaced around the floor,
       gold = whose turn is next, center = the all-in-one dashboard (2x2 grid). -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#c9d8d7" stroke-width="2"/>
  <circle cx="32" cy="12" r="5.5" fill="#f5c870"/>
  <circle cx="49.3" cy="22" r="4" fill="#1a5252"/>
  <circle cx="49.3" cy="42" r="4" fill="#1a5252"/>
  <circle cx="32" cy="52" r="4" fill="#1a5252"/>
  <circle cx="14.7" cy="42" r="4" fill="#1a5252"/>
  <circle cx="14.7" cy="22" r="4" fill="#1a5252"/>
  <rect x="27" y="27" width="4.3" height="4.3" rx="1" fill="#1a5252"/>
  <rect x="32.7" y="27" width="4.3" height="4.3" rx="1" fill="#1a5252"/>
  <rect x="27" y="32.7" width="4.3" height="4.3" rx="1" fill="#1a5252"/>
  <rect x="32.7" y="32.7" width="4.3" height="4.3" rx="1" fill="#1a5252"/>
</svg>
