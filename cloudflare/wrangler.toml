name               = "turndesk"
main               = "worker.js"
compatibility_date = "2024-11-20"
account_id         = "7e47fe5134a4b77582cf7746bff3fb62"

# ── Observability ──────────────────────────────────────────────────────────────
# Persist console.* output so errors are queryable in the Cloudflare dashboard
# (Workers & Pages → turndesk → Logs) instead of being ephemeral. Free tier
# included; also viewable live with `wrangler tail`. head_sampling_rate=1 = keep all.
[observability]
enabled = true
head_sampling_rate = 1

# ── Cron Trigger (removed 2026-07-11) ───────────────────────────────────────────
# There is no scheduled() handler in worker.js, so the daily cron only fired a no-op
# invocation (the Sheets export/email it once described was never built in TurnDesk).
# Backups are per-DO alarm() → R2 snapshots. Re-add a [triggers] crons block only
# together with an actual scheduled() handler.

# ── R2 bucket binding ─────────────────────────────────────────────────────────
# Create the bucket first:  wrangler r2 bucket create turndesk-photos
[[r2_buckets]]
binding     = "PHOTOS_BUCKET"
bucket_name = "turndesk-photos"

# ── Durable Object binding ─────────────────────────────────────────────────────
# Enables real-time WebSocket sync. Migrations run automatically on deploy.
[[durable_objects.bindings]]
name       = "SALON_DO"
class_name = "TurnDeskDO"

[[migrations]]
tag                = "v1"
new_sqlite_classes = ["TurnDeskDO"]

# ── Secrets ───────────────────────────────────────────────────────────────────
# Set each secret once via the CLI — never commit secret values to this file:
#
#   wrangler secret put SHEETS_URL
#   wrangler secret put SQUARE_TOKEN
#
# SHEETS_URL          — FRESH Google Apps Script web-app /exec URL (write-only daily backup intake)
# SQUARE_TOKEN        — Square access token (sandbox or production)
# RESTORE_TOKEN       — (optional) gates POST /state/restore and POST /backup/run
# VAPID_PRIVATE_KEY   — Web Push signing key (JWK JSON string). Set once:
#                         wrangler secret put VAPID_PRIVATE_KEY
#                       (matching public key is VAPID_PUBLIC_KEY below + js/app/config.js)
# ORIGIN_GATE_ENABLED — (optional) "true" enables the Origin allow-list gate; unset/"false" = off (default).
#                       Flip live with `wrangler secret put ORIGIN_GATE_ENABLED` — no redeploy. Built-in
#                       allowed origin: https://musenail.github.io. Add more via ALLOWED_ORIGINS.
# ALLOWED_ORIGINS     — (optional) extra comma-separated origins to allow (e.g. a future custom domain)

# ── Environment variables ──────────────────────────────────────────────────────
[vars]
# Web Push: non-secret VAPID public key (matches js/app/config.js VAPID_PUBLIC_KEY)
# + the contact subject sent in the VAPID JWT. The PRIVATE key is a secret (above).
VAPID_PUBLIC_KEY = "BCoL00zoZ6BMiurBxzhh05439KLXdDCgmd6z6bQzOl4r30VYBq7Xzvf5Xl5DqsuqUchNE7xnfcaCrvgUvfJ2uKk"
VAPID_SUBJECT    = "mailto:admin@turndesk.app"
# SQUARE_BASE_URL = "https://connect.squareup.com"
# Uncomment and set to the sandbox URL during testing:
# SQUARE_BASE_URL = "https://connect.squareupsandbox.com"

# ═══════════════════════════════════════════════════════════════════════════════
# STAGING ENVIRONMENT (M2 — deploy safety)   →  runbook: cloudflare/STAGING.md
# ═══════════════════════════════════════════════════════════════════════════════
# `wrangler deploy --env staging` publishes a SEPARATE worker `turndesk-staging`
# with its OWN Durable Object namespace + its OWN R2 bucket, so a change — or even a
# bad DO migration — validated here can NEVER touch a production salon. Prod stays a
# plain `wrangler deploy` (no --env).
#
# ⚠ Wrangler RULE: for a named env, bindings + vars + secrets are NOT inherited from
#   the top level — every block below is re-declared on purpose. (main,
#   compatibility_date, account_id ARE inherited, so they're omitted here.)
# ⚠ Secrets are per-env and never live in this file. Set them separately:
#     wrangler secret put OPERATOR_TOKEN --env staging   (throwaway value, NOT prod's)
#     wrangler secret put RESTORE_TOKEN  --env staging
#     wrangler secret put APP_ADMIN_PIN  --env staging
#   Leave HELCIM_API_TOKEN / SQUARE_TOKEN / SHEETS_URL / VAPID_PRIVATE_KEY UNSET so
#   payments, Sheets and push stay inert on staging (guardrail: no test card ever hits
#   the shared live processor).
# ⚠ Do NOT add script_name to the DO binding (that would point staging at PROD DOs).
# ⚠ The bucket_name MUST differ from prod's turndesk-photos, and be created first:
#     wrangler r2 bucket create turndesk-photos-staging
# ═══════════════════════════════════════════════════════════════════════════════
[env.staging]
name = "turndesk-staging"

[env.staging.observability]
enabled = true
head_sampling_rate = 1

# vars are non-inheritable — re-declared. AUTH_ENFORCED is a plain string the worker
# compares to "true", so it lives here as a var (not a secret) and mirrors prod's
# enforced-auth so staging exercises the real sign-in path.
[env.staging.vars]
VAPID_PUBLIC_KEY = "BCoL00zoZ6BMiurBxzhh05439KLXdDCgmd6z6bQzOl4r30VYBq7Xzvf5Xl5DqsuqUchNE7xnfcaCrvgUvfJ2uKk"
VAPID_SUBJECT    = "mailto:admin@turndesk.app"
AUTH_ENFORCED    = "true"

# R2: SAME binding name (worker code unchanged), DIFFERENT bucket → isolated photos + backups.
[[env.staging.r2_buckets]]
binding     = "PHOTOS_BUCKET"
bucket_name = "turndesk-photos-staging"

# DO binding: non-inherited, NO script_name → binds to turndesk-staging's OWN
# TurnDeskDO namespace = storage physically separate from prod salons.
[[env.staging.durable_objects.bindings]]
name       = "SALON_DO"
class_name = "TurnDeskDO"

# Migration registers TurnDeskDO as a SQLite class on the staging worker (its own
# migration history; same tag/class as prod).
[[env.staging.migrations]]
tag                = "v1"
new_sqlite_classes = ["TurnDeskDO"]
